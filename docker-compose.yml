version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scholarship_db_container
    environment:
      POSTGRES_DB: scholarship_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.dir/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: scholarship_backend_container
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/scholarship_db
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
