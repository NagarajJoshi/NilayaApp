<div class="auth-box">
  <h2>{{ isLoginMode ? 'Sign In to Portal' : 'Create Student Account' }}</h2>
  
  <div *ngIf="message" [class.error]="isError" [class.success]="!isError" class="banner">
    {{ message }}
  </div>

  <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
    <div class="field">
      <label for="username">User ID / Username</label>
      <!-- MANDATORY: formControlName MUST match the string key in the TS file -->
      <input id="username" type="text" formControlName="username" placeholder="Enter username">
    </div>
    
    <div class="field">
      <label for="password">Password</label>
      <!-- MANDATORY: formControlName MUST match the string key in the TS file -->
      <input id="password" type="password" formControlName="password" placeholder="••••••••">
    </div>

    <div class="field" *ngIf="!isLoginMode">
      <label for="role">Account Intended Role Type</label>
      <select id="role" formControlName="role">
        <option value="ROLE_STUDENT">Scholarship Applicant (Student)</option>
        <option value="ROLE_ADMIN">System Reviewer (Admin)</option>
      </select>
    </div>

    <button type="submit" [disabled]="authForm.invalid">
      {{ isLoginMode ? 'Login' : 'Register Account' }}
    </button>
  </form>

  <p class="switch-link" (click)="toggleMode()">
    {{ isLoginMode ? "Don't have an account? Sign up here" : "Already have an account? Login here" }}
  </p>
</div>
